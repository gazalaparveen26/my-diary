<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Diary</title>

<link rel="stylesheet" href="main.css">
<link rel="stylesheet" href="features/templates/templates.css">
<link rel="stylesheet" href="features/mood/mood.css">
</head>

<body>

<div id="login">
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="diary" style="display:none;">
  <h1>My Diary</h1>

  <input type="date" id="date" onchange="loadByDate()">

  <div id="mood-box">
    <span onclick="selectMood('happy')">😊</span>
    <span onclick="selectMood('sad')">😢</span>
    <span onclick="selectMood('angry')">😡</span>
    <span onclick="selectMood('tired')">😴</span>
  </div>

  <select id="template" onchange="changeTemplate()">
    <option value="default">Default</option>
    <option value="love">Love</option>
    <option value="happy">Happy</option>
    <option value="sad">Sad</option>
  </select>

  <input type="file" id="image"><br><br>

  <textarea id="entry"></textarea><br>

  <button onclick="saveEntry()">Save</button>
  <button onclick="downloadPDF()">Download PDF</button>

  <hr>

  <input type="text" id="search" placeholder="Search">
  <button onclick="searchEntries()">Search</button>

  <div id="results"></div>
</div>

<script type="module" src="firebase/config.js"></script>
<script type="module" src="features/templates/templates.js"></script>
<script type="module" src="features/mood/mood.js"></script>
<script type="module" src="features/entries/entries.js"></script>
<script type="module" src="features/search/search.js"></script>
<script type="module" src="features/pdf/pdf.js"></script>

</body>
</html>
