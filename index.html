<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diary</title>
<link rel="stylesheet" href="main.css">
<link rel="stylesheet" href="features/templates/templates.css">
</head>
<body>

<div id="login">
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="diary" style="display:none;">
  <h1>My Diary</h1>

  <select id="template" onchange="changeTemplate()">
    <option value="default">Default</option>
    <option value="love">Love</option>
    <option value="happy">Happy</option>
    <option value="sad">Sad</option>
  </select>

  <textarea id="entry"></textarea><br>
  <button onclick="saveEntry()">Save</button>
</div>

<script type="module" src="firebase/config.js"></script>
<script type="module" src="features/templates/templates.js"></script>
<script type="module" src="features/entries/entries.js"></script>

</body>
</html>
